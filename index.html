<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Join MADANI ALUMNI RUN and be part of an exciting running event. Register now to secure your spot, submit your details. Connect with fellow alumni in this inspiring community event." />
    <link rel="preload" href="./assets/images/bg-main.webp" as="image" fetchpriority="high" />
    <link rel="preload" href="./assets/images/madani-logo.webp" as="image" fetchpriority="high" />
    <link rel="icon" href="./assets/images/madani-logo.ico" type="image/x-icon" />
    <title>MADANI ALUMNI RUN - Registration Form</title>
    <style>
      @font-face {
        font-family: "switzer";
        src: url("./assets/fonts/Switzer-Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: "switzer";
        src: url("./assets/fonts/Switzer-Bold.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "switzer", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background-image: url("./assets/images/bg-main.png");
        background-image: image-set(url("./assets/images/bg-main.webp") type("image/webp"), url("./assets/images/bg-main.png") type("image/png"));
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .logo {
        max-width: 300px;
        width: 100%;
        display: block;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 10px;
      }

      .event-subtitle {
        color: #1a237e;
        text-align: center;
        font-size: 1.08rem;
        margin-bottom: 28px;
      }

      .event-meta {
        display: grid;
        grid-template-columns: repeat(3, max-content);
        gap: 60px;
        justify-content: center;
        margin-top: 35px;
        margin-bottom: 35px;
        justify-items: center;
      }

      .event-meta-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .event-meta-icon {
        width: 28px;
        height: 28px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .event-meta-text {
        display: flex;
        flex-direction: column;
        line-height: 1.3;
      }

      .event-meta-label {
        color: #455a64;
        font-size: 0.8rem;
      }

      .event-meta-value {
        color: #1a237e;
        font-size: 0.86rem;
        font-weight: 700;
      }

      .form-container {
        width: 100%;
        max-width: 1000px;
        margin-top: 40px;
        margin-bottom: 40px;
        position: relative;
        z-index: 1;
      }

      .form-card {
        background: #fff5e3;
        border-radius: 20px;
        outline: 6px solid rgba(255, 245, 227, 0.2);
        padding: 30px;
        margin-top: 30px;
        margin-bottom: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .is-hidden {
        display: none;
      }

      .form-group label {
        display: block;
        color: #1a237e;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 0.95rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .package-section {
        margin-bottom: 24px;
      }

      .section-title {
        color: #1a237e;
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .size-banner {
        margin: 8px 0 18px;
        border-radius: 12px;
        overflow: hidden;
      }

      .size-banner img {
        width: 100%;
        height: auto;
        display: block;
      }

      .package-options {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .package-option {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.95);
        border: 2px solid transparent;
        border-radius: 18px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        cursor: pointer;
        transition: all 0.2s ease;
        min-height: 230px;
        min-width: 0;
        overflow: hidden;
      }

      .package-option:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      }

      .package-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .package-image {
        width: 100%;
        max-width: none;
        height: 170px;
        flex-shrink: 0;
        object-fit: cover;
        border-radius: 14px;
        background: #f7f7fb;
      }

      .package-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        width: 100%;
        align-items: center;
        text-align: center;
        min-width: 0;
      }

      .package-title {
        color: #1a237e;
        font-size: 0.9rem;
        font-weight: 700;
        line-height: 1.25;
        white-space: normal;
        word-break: break-word;
      }

      .package-desc {
        color: #5c6b7a;
        font-size: 0.72rem;
        line-height: 1.3;
        white-space: normal;
        word-break: break-word;
      }

      .package-text-oneline {
        white-space: normal;
        display: block;
      }

      .package-title.package-text-oneline {
        font-size: 0.84rem;
      }

      .package-desc.package-text-oneline {
        font-size: 0.7rem;
      }

      .package-radio {
        display: none;
      }

      .package-option:has(input:checked) {
        border-color: #1a237e;
        background: #f7f8ff;
      }

      .package-option:has(input:checked) .package-radio {
        display: none;
      }

      .form-control {
        width: 100%;
        padding: 15px 20px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.8);
        font-size: 1rem;
        color: #333;
        transition: all 0.3s ease;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
      }

      .form-control::placeholder {
        color: #999;
      }

      .form-control:focus {
        outline: none;
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
      }

      select.form-control {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg xmlns='[w3.org](http://www.w3.org/2000/svg)' width='12' height='12' viewBox='0 0 12 12'%3E%3Cpath fill='%231a237e' d='M6 8L1 3h10z'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 15px center;
        padding-right: 40px;
      }

      .payment-info {
        display: grid;
        grid-template-columns: 190px auto;
        gap: 24px;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        padding: 20px 24px;
        background: #ffffff;
        border-radius: 14px;
      }

      .payment-block {
        margin-bottom: 22px;
      }

      .payment-divider {
        width: 100%;
        margin-bottom: 14px;
      }

      .payment-divider img {
        width: 100%;
        max-width: 860px;
        height: auto;
        object-fit: contain;
        display: block;
        margin: 0 auto;
      }

      .qr-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qr-image {
        width: 170px;
        height: 170px;
        object-fit: contain;
      }

      .payment-detail {
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
      }

      .payment-row {
        display: block;
        margin-bottom: 0;
      }

      .payment-label {
        color: #1a237e;
        font-size: 0.95rem;
      }

      .payment-value {
        color: #1a237e;
        font-weight: 500;
        font-size: 0.95rem;
      }

      .account-name {
        font-weight: 700;
        color: #1a237e;
      }

      .account-number {
        font-weight: 700;
        color: #1a237e;
        font-size: 1.2rem;
      }

      .upload-area {
        position: relative;
        width: 100%;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.8);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s ease;
      }

      .upload-area:hover {
        background: rgba(255, 255, 255, 1);
      }

      .upload-area input[type="file"] {
        position: absolute;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        left: 0;
        top: 0;
      }

      .upload-text {
        color: #666;
        font-size: 1rem;
      }

      .upload-icon {
        color: #1a237e;
        font-size: 1.2rem;
      }

      .btn-register {
        width: 100%;
        padding: 12px;
        background: #1a237e;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-register:hover {
        background: #0d1654;
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(26, 35, 126, 0.4);
      }

      .btn-register:active {
        transform: translateY(0);
      }

      @media (max-width: 966px) {
        .package-options {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
        }

        .package-option {
          min-height: 224px;
          padding: 12px;
          border-radius: 16px;
        }

        .package-image {
          max-width: none;
          width: 100%;
          height: 170px;
          border-radius: 14px;
        }

        .package-title {
          font-size: 0.9rem;
        }

        .package-desc {
          font-size: 0.71rem;
        }
      }

      /* Mobile */
      @media (max-width: 768px) {
        body {
          padding: 12px;
          background-position: top center;
        }

        .form-container {
          margin-top: 12px;
          margin-bottom: 20px;
        }

        .logo {
          max-width: 200px;
        }

        .header {
          margin-top: 300px;
          margin-bottom: 400px;
        }

        .form-card {
          padding: 18px;
          margin-top: 16px;
          margin-bottom: 14px;
          border-radius: 16px;
          outline-width: 4px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 15px;
        }

        .package-section {
          margin-bottom: 18px;
        }

        .package-options {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .section-title {
          font-size: 0.95rem;
          margin-bottom: 10px;
        }

        .size-banner {
          margin: 6px 0 14px;
          border-radius: 10px;
        }

        .package-option {
          min-height: auto;
          padding: 10px;
          border-radius: 14px;
        }

        .package-image {
          max-width: none;
          width: 100%;
          height: 170px;
          border-radius: 12px;
          object-fit: contain;
          object-position: center;
          background: #ffffff;
        }

        .package-title {
          font-size: 0.84rem;
        }

        .package-desc {
          font-size: 0.68rem;
        }

        .event-subtitle {
          margin-bottom: 18px;
          font-size: 1rem;
        }

        .event-meta {
          grid-template-columns: 1fr;
          gap: 8px;
          margin-bottom: 18px;
          justify-items: stretch;
        }

        .event-meta-item {
          padding: 6px 0;
          justify-content: flex-start;
        }

        .event-meta-icon {
          width: 24px;
          height: 24px;
        }

        .event-meta-label {
          font-size: 0.74rem;
        }

        .event-meta-value {
          font-size: 0.8rem;
        }

        .payment-info {
          grid-template-columns: 1fr;
          gap: 10px;
          padding: 14px;
          text-align: center;
          justify-items: center;
        }

        .payment-divider {
          margin-bottom: 12px;
        }

        .qr-image {
          width: 140px;
          height: 140px;
        }

        .account-number {
          font-size: 1.1rem;
        }

        .payment-detail {
          padding: 8px 0;
          width: 100%;
        }

        .payment-row {
          justify-content: center;
          gap: 6px;
          flex-wrap: wrap;
        }

        .form-control {
          padding: 12px 15px;
        }

        .upload-area {
          padding: 11px 14px;
        }

        .btn-register {
          padding: 14px;
          font-size: 1rem;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .form-card {
          padding: 15px;
          border-radius: 15px;
          outline-width: 3px;
        }

        .form-group label {
          font-size: 0.85rem;
        }

        .form-control {
          font-size: 0.9rem;
          padding: 12px;
        }

        .payment-detail {
          padding: 6px 0;
          align-items: center;
        }

        .qr-image {
          width: 120px;
          height: 120px;
        }

        .payment-label,
        .payment-value {
          font-size: 0.8rem;
        }

        .event-meta-label {
          font-size: 0.7rem;
        }

        .event-meta-value {
          font-size: 0.76rem;
        }

        .package-option {
          padding: 10px;
        }

        .package-image {
          height: 156px;
          object-fit: contain;
          object-position: center;
          background: #ffffff;
        }

        .package-title {
          font-size: 0.8rem;
        }

        .package-desc {
          font-size: 0.65rem;
        }

        .btn-register {
          border-radius: 8px;
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-card {
        animation: fadeInUp 0.6s ease forwards;
      }

      .form-card:nth-child(2) {
        animation-delay: 0.2s;
      }

      .upload-area.has-file .upload-text {
        color: #1a237e;
        font-weight: 600;
      }

      .popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        padding: 20px;
      }

      .popup-overlay.show {
        display: flex;
      }

      .popup-card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 16px;
        padding: 26px 22px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeInUp 0.25s ease;
      }

      .popup-title {
        color: #1a237e;
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .popup-message {
        color: #444;
        font-size: 0.98rem;
        margin-bottom: 20px;
      }

      .popup-button {
        background: #1a237e;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 28px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .popup-button:hover {
        background: #0d1654;
      }
    </style>
  </head>
  <body>
    <main class="form-container">
      <form id="registrationForm">
        <div class="form-card">
          <picture>
            <source srcset="./assets/images/madani-logo.webp" type="image/webp" />
            <img class="logo" src="./assets/images/madani-logo.png" alt="Madani Logo" />
          </picture>

          <div class="event-meta">
            <div class="event-meta-item">
              <picture>
                <source srcset="./assets/images/calendar.webp" type="image/webp" />
                <img class="event-meta-icon" src="./assets/images/calendar.png" alt="Registration duration icon" />
              </picture>
              <div class="event-meta-text">
                <span class="event-meta-label">Registration Duration</span>
                <span class="event-meta-value">13 Mar 2026 - 03 May 2026</span>
              </div>
            </div>

            <div class="event-meta-item">
              <picture>
                <source srcset="./assets/images/location.webp" type="image/webp" />
                <img class="event-meta-icon" src="./assets/images/location.png" alt="Venue icon" />
              </picture>
              <div class="event-meta-text">
                <span class="event-meta-label">Venue</span>
                <span class="event-meta-value">Dataran Putrajaya</span>
              </div>
            </div>

            <div class="event-meta-item">
              <picture>
                <source srcset="./assets/images/time.webp" type="image/webp" />
                <img class="event-meta-icon" src="./assets/images/time.png" alt="Event duration icon" />
              </picture>
              <div class="event-meta-text">
                <span class="event-meta-label">Event Date</span>
                <span class="event-meta-value">10 May 2026</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="fullName">Nama Lengkap</label>
            <input type="text" id="fullName" name="fullName" class="form-control" placeholder="A***** F*******" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="university">Asal Universitas</label>
              <input type="text" id="university" name="university" class="form-control" placeholder="e.g. Universiti Malaya" required />
            </div>

            <div class="form-group">
              <label for="whatsapp">Nomor Whatsapp</label>
              <input type="text" id="whatsapp" name="whatsapp" class="form-control" placeholder="e.g. 60**********" inputmode="numeric" pattern="[0-9]*" autocomplete="tel-national" maxlength="15" required />
            </div>
          </div>

          <div class="form-group">
            <label for="eventType">Event Type</label>
            <select id="eventType" name="eventType" class="form-control" required>
              <option value="" disabled selected>Choose Type</option>
              <option value="3K Run">3K Run</option>
              <option value="5K Run">5K Run</option>
            </select>
          </div>
        </div>

        <div class="form-card">
          <div class="package-section">
            <div class="section-title">Pilih Jenis Paket</div>
            <div class="package-options">
              <label class="package-option">
                <input type="radio" name="packageType" value="Jersey Edition RM25" data-requires-size="true" required />
                <img class="package-image" src="./assets/images/jersey1.png" alt="PPIM x MADANI RUN jersey package" />
                <div class="package-copy">
                  <span class="package-title package-text-oneline">PPIM x MADANI RUN Jersey Edition price: RM25</span>
                  <span class="package-desc">only jersey from PPIM Malaysia, limited slots</span>
                </div>
                <span class="package-radio"></span>
              </label>

              <label class="package-option">
                <input type="radio" name="packageType" value="Normal RM50" data-requires-size="true" />
                <img class="package-image" src="./assets/images/jersey2.png" alt="Normal package jersey" />
                <div class="package-copy">
                  <span class="package-title">Normal price: RM50</span>
                  <span class="package-desc">get medal, jersey + sponsorship products</span>
                </div>
                <span class="package-radio"></span>
              </label>

              <label class="package-option">
                <input type="radio" name="packageType" value="Half Price RM30" data-requires-size="true" />
                <img class="package-image" src="./assets/images/jersey2.png" alt="Half price package jersey" />
                <div class="package-copy">
                  <span class="package-title">Half price: RM30</span>
                  <span class="package-desc package-text-oneline">choose either one medal/jersey + sponsorship products</span>
                </div>
                <span class="package-radio"></span>
              </label>

              <label class="package-option">
                <input type="radio" name="packageType" value="Half Price RM30 - Medal + Sponsorship Product" data-requires-size="false" />
                <img class="package-image" src="./assets/images/jersey2.png" alt="Half price package medal and sponsorship" />
                <div class="package-copy">
                  <span class="package-title">Half price: RM30</span>
                  <span class="package-desc">Medal + sponsorship products</span>
                </div>
                <span class="package-radio"></span>
              </label>
            </div>
          </div>

          <div class="size-banner" id="sizeBanner">
            <img src="./assets/images/size-banner.png" alt="Jersey size chart" />
          </div>

          <div class="form-group is-hidden" id="shirtSizeGroup">
            <label for="shirtSize">Pilih Ukuran</label>
            <select id="shirtSize" name="shirtSize" class="form-control">
              <option value="" disabled selected>Choose Size</option>
              <option value="XS">XS</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="form-group is-hidden" id="shirtSizeOtherGroup">
            <label for="shirtSizeOther">Others</label>
            <input type="text" id="shirtSizeOther" name="shirtSizeOther" class="form-control" placeholder="Type your size (e.g. 3XL, 4XL, etc)" />
          </div>

          <div class="payment-block">
            <div class="payment-divider">
              <img src="./assets/images/line.png" alt="Section divider" />
            </div>
            <div class="payment-info">
              <div class="qr-wrap">
                <picture>
                  <source srcset="./assets/images/qr.webp" type="image/webp" />
                  <img class="qr-image" src="./assets/images/qr.png" alt="Payment QR code" />
                </picture>
              </div>

              <div class="payment-detail">
                <div class="payment-row">
                  <span class="payment-label">Malaysia (Ringgit)</span>
                </div>
                <div class="payment-row">
                  <span class="account-name">Fio Rafi Hafizh Fauzi</span>
                </div>
                <div class="payment-row">
                  <span class="payment-value">CIMB</span>
                </div>
                <div class="payment-row">
                  <span class="account-number">7649807687</span>
                </div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="paymentProof">Bukti Pembayaran</label>
            <div class="upload-area" id="uploadArea">
              <span class="upload-text">Upload Here</span>
              <img width="12" src="./assets/images/download.ico" alt="" />
              <input type="file" id="paymentProof" name="paymentProof" accept="image/*,.pdf" required />
            </div>
          </div>

          <button type="submit" class="btn-register">Register</button>
        </div>
      </form>
    </main>

    <div class="popup-overlay" id="successPopup" role="dialog" aria-modal="true" aria-labelledby="successPopupTitle">
      <div class="popup-card">
        <h2 class="popup-title" id="successPopupTitle">Success</h2>
        <p class="popup-message">You have registered successfully!</p>
        <button type="button" class="popup-button" id="closeSuccessPopup">OK</button>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("paymentProof");
      const whatsappInput = document.getElementById("whatsapp");
      const uploadArea = document.getElementById("uploadArea");
      const uploadText = uploadArea.querySelector(".upload-text");
      const successPopup = document.getElementById("successPopup");
      const popupTitle = successPopup.querySelector(".popup-title");
      const popupMessage = successPopup.querySelector(".popup-message");
      const closeSuccessPopupButton = document.getElementById("closeSuccessPopup");
      const shirtSizeGroup = document.getElementById("shirtSizeGroup");
      const shirtSizeSelect = document.getElementById("shirtSize");
      const shirtSizeOtherGroup = document.getElementById("shirtSizeOtherGroup");
      const shirtSizeOtherInput = document.getElementById("shirtSizeOther");
      const sizeBanner = document.getElementById("sizeBanner");
      const packageTypeInputs = document.querySelectorAll('input[name="packageType"]');

      function showPopup(title, message) {
        popupTitle.textContent = title;
        popupMessage.textContent = message;
        successPopup.classList.add("show");
      }

      function showSuccessPopup() {
        showPopup("Success", "You have registered successfully!");
      }

      function hideSuccessPopup() {
        successPopup.classList.remove("show");
      }

      closeSuccessPopupButton.addEventListener("click", hideSuccessPopup);
      successPopup.addEventListener("click", (event) => {
        if (event.target === successPopup) {
          hideSuccessPopup();
        }
      });

      whatsappInput.addEventListener("input", function () {
        this.value = this.value.replace(/\D/g, "");
      });

      function updateShirtSizeVisibility() {
        const selectedPackage = document.querySelector('input[name="packageType"]:checked');
        const requiresSize = selectedPackage && selectedPackage.dataset.requiresSize === "true";

        if (requiresSize) {
          shirtSizeGroup.classList.remove("is-hidden");
          sizeBanner.classList.remove("is-hidden");
          shirtSizeSelect.required = true;
          updateOtherSizeVisibility();
          return;
        }

        shirtSizeGroup.classList.add("is-hidden");
        sizeBanner.classList.add("is-hidden");
        shirtSizeSelect.required = false;
        shirtSizeSelect.value = "";
        shirtSizeOtherGroup.classList.add("is-hidden");
        shirtSizeOtherInput.required = false;
        shirtSizeOtherInput.value = "";
      }

      function updateOtherSizeVisibility() {
        const showOthers = !shirtSizeGroup.classList.contains("is-hidden") && shirtSizeSelect.value === "Others";

        if (showOthers) {
          shirtSizeOtherGroup.classList.remove("is-hidden");
          shirtSizeOtherInput.required = true;
          return;
        }

        shirtSizeOtherGroup.classList.add("is-hidden");
        shirtSizeOtherInput.required = false;
        shirtSizeOtherInput.value = "";
      }

      packageTypeInputs.forEach((input) => {
        input.addEventListener("change", updateShirtSizeVisibility);
      });

      shirtSizeSelect.addEventListener("change", updateOtherSizeVisibility);

      updateShirtSizeVisibility();

      fileInput.addEventListener("change", function () {
        if (this.files && this.files[0]) {
          uploadText.textContent = this.files[0].name;
          uploadArea.classList.add("has-file");
        } else {
          uploadText.textContent = "Upload Here";
          uploadArea.classList.remove("has-file");
        }
      });

      const scriptURL = "https://script.google.com/macros/s/AKfycbzGT5oOcvrmT9fFaN-aS__zrkiLb5xsWEPdBgzSmtEjbovM74ULB8QWSA9dtbGI9Aub/exec";

      const form = document.getElementById("registrationForm");
      const submitButton = form.querySelector(".btn-register");
      const MAX_FILE_SIZE_MB = 5;
      const MAX_IMAGE_DIMENSION = 1400;
      const IMAGE_QUALITY = 0.78;

      let preparedUploadCache = null;

      function getFileKey(file) {
        return `${file.name}:${file.size}:${file.lastModified}:${file.type}`;
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(typeof reader.result === "string" ? reader.result : "");
          reader.onerror = () => reject(new Error("Could not read the file."));
          reader.readAsDataURL(blob);
        });
      }

      function compressImageFile(file) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          const objectUrl = URL.createObjectURL(file);

          image.onload = () => {
            try {
              const canvas = document.createElement("canvas");
              const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(image.width, image.height));
              canvas.width = Math.round(image.width * scale);
              canvas.height = Math.round(image.height * scale);

              const context = canvas.getContext("2d");
              if (!context) {
                URL.revokeObjectURL(objectUrl);
                resolve(file);
                return;
              }

              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              canvas.toBlob(
                (blob) => {
                  URL.revokeObjectURL(objectUrl);
                  if (!blob) {
                    resolve(file);
                    return;
                  }

                  const baseName = file.name.replace(/\.[^.]+$/, "");
                  resolve(new File([blob], `${baseName}.webp`, { type: "image/webp" }));
                },
                "image/webp",
                IMAGE_QUALITY,
              );
            } catch (error) {
              URL.revokeObjectURL(objectUrl);
              resolve(file);
            }
          };

          image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error("Could not process the image."));
          };

          image.src = objectUrl;
        });
      }

      async function prepareUploadFile(file) {
        if (file.type.startsWith("image/")) {
          return compressImageFile(file);
        }

        return file;
      }

      async function buildUploadPayload(file) {
        const uploadFile = await prepareUploadFile(file);
        const dataUrl = await blobToDataUrl(uploadFile);
        const base64Content = dataUrl.includes(",") ? dataUrl.split(",")[1] : dataUrl;

        return {
          key: getFileKey(file),
          uploadFile,
          base64Content,
        };
      }

      fileInput.addEventListener("change", async function () {
        if (!this.files || !this.files[0]) {
          preparedUploadCache = null;
          return;
        }

        const selectedFile = this.files[0];
        const currentKey = getFileKey(selectedFile);

        try {
          const prepared = await buildUploadPayload(selectedFile);
          const latestFile = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
          if (!latestFile || getFileKey(latestFile) !== currentKey) {
            preparedUploadCache = null;
            return;
          }

          preparedUploadCache = prepared;
        } catch (error) {
          console.error(error);
          preparedUploadCache = null;
        }
      });

      document.getElementById("registrationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const fileInput = document.getElementById("paymentProof");
        const file = fileInput.files[0];

        if (!file) {
          alert("Please upload payment proof first.");
          return;
        }

        if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
          alert(`File is too large. Maximum allowed size is ${MAX_FILE_SIZE_MB}MB.`);
          return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "Sending...";

        try {
          const fileKey = getFileKey(file);
          let preparedUpload = preparedUploadCache;

          if (!preparedUpload || preparedUpload.key !== fileKey) {
            preparedUpload = await buildUploadPayload(file);
          }

          const uploadFile = preparedUpload.uploadFile;
          const formData = new FormData(form);
          const data = Object.fromEntries(formData.entries());

          if (data.shirtSize === "Others") {
            const customShirtSize = (data.shirtSizeOther || "").trim();
            if (!customShirtSize) {
              alert("Please fill in your custom shirt size.");
              return;
            }
            data.shirtSize = customShirtSize;
          }

          if (data.shirtSize !== "Others") {
            delete data.shirtSizeOther;
          }

          data.paymentProof = preparedUpload.base64Content;
          data.paymentProofName = uploadFile.name || file.name;
          data.paymentProofMimeType = uploadFile.type || file.type || "application/octet-stream";

          // console.log("Form payload summary:", {
          //   fullName: data.fullName,
          //   university: data.university,
          //   whatsapp: data.whatsapp,
          //   eventType: data.eventType,
          //   packageType: data.packageType,
          //   paymentProofName: data.paymentProofName,
          //   paymentProofMimeType: data.paymentProofMimeType,
          //   paymentProofLength: data.paymentProof ? data.paymentProof.length : 0,
          // });

          if (!data.eventType || !data.packageType) {
            alert("Please select event type and package type first.");
            return;
          }

          const response = await fetch(scriptURL, {
            method: "POST",
            body: new URLSearchParams(data),
          });

          const responseText = await response.text();
          let responseData = null;

          try {
            responseData = JSON.parse(responseText);
          } catch (parseError) {
            responseData = null;
          }

          if (responseData && responseData.ok === false) {
            throw new Error(responseData.error || "Upload failed");
          }

          if (!response.ok) {
            throw new Error(responseText || "Upload failed");
          }

          showSuccessPopup();
          form.reset();
          preparedUploadCache = null;
          uploadText.textContent = "Upload Here";
          uploadArea.classList.remove("has-file");
          updateShirtSizeVisibility();
          updateOtherSizeVisibility();
        } catch (error) {
          console.error(error);
          const message = String(error && error.message ? error.message : error);
          if (message.toLowerCase().includes("drive")) {
            showPopup("Upload Failed", "Server Drive error. Please try again in a few minutes or check Google Drive/Apps Script permissions.");
          } else {
            showPopup("Submission Failed", message || "Failed to submit. Please check file size/type and script access.");
          }
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Register";
        }
      });
    </script>
  </body>
</html>
